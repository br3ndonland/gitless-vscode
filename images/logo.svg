<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <!-- Diamond shape: rotated rounded rectangle with currentColor border and dark fill -->
  <rect
    x="48" y="48" width="160" height="160"
    rx="30" ry="30"
    fill="none"
    stroke-width="12"
    stroke="currentColor"
    transform="rotate(45, 128, 128)"
  />
  <!-- Git commit vertical symbol (Lucide git-commit-vertical, scaled to fit) -->
  <line x1="128" y1="42" x2="128" y2="96" stroke-width="12" stroke-linecap="round" stroke="currentColor" />
  <circle cx="128" cy="128" r="32" stroke-width="12" stroke="currentColor" />
  <line x1="128" y1="160" x2="128" y2="214" stroke-width="12" stroke-linecap="round" stroke="currentColor" />
</svg>
