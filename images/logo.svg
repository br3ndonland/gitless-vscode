<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <!-- Tighten margins and increase stroke weight for better activity bar legibility. -->
  <rect
    x="44" y="44" width="168" height="168"
    rx="32" ry="32"
    fill="none"
    stroke="currentColor"
    stroke-width="16"
    transform="rotate(45 128 128)"
  />
  <!-- Scale the inner git mark up so it does not fade next to filled icons. -->
  <line x1="128" y1="30" x2="128" y2="86" stroke="currentColor" stroke-width="16" stroke-linecap="round" />
  <circle cx="128" cy="128" r="38" stroke="currentColor" stroke-width="16" />
  <line x1="128" y1="170" x2="128" y2="226" stroke="currentColor" stroke-width="16" stroke-linecap="round" />
</svg>
